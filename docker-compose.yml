services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud-net

  kafka-0:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - zookeeper
    networks:
      - fraud-net

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - zookeeper
    networks:
      - fraud-net

  producer:
    build: ./producer
    container_name: fraud-producer
    environment:
      - KAFKA_BROKERS=kafka-0:9092,kafka-1:9092
      - KAFKA_TOPIC=transactions
    volumes:
      - ./data:/app/data
    depends_on:
      - kafka-0
      - kafka-1
    networks:
      - fraud-net

  consumer:
    build: ./consumer
    container_name: fraud-consumer
    environment:
      - KAFKA_BROKERS=kafka-0:9092,kafka-1:9092
      - KAFKA_TOPIC=transactions
    depends_on:
      - kafka-0
      - kafka-1
    networks:
      - fraud-net

  dashboard:
    build: ./dashboard
    container_name: fraud-dashboard
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKERS=kafka-0:9092,kafka-1:9092
    depends_on:
      - kafka-0
      - kafka-1
    networks:
      - fraud-net

networks:
  fraud-net:
    driver: bridge